<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Divan · Painel Administrativo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="design-system.css" />
<link rel="stylesheet" href="extras-admin.css" />
<link rel="stylesheet" href="extras-cargas.css" />
<link rel="stylesheet" href="extras-nps.css" />
<link rel="stylesheet" href="extras-mapa.css" />
<link rel="stylesheet" href="hub-button.css?v=3" />
<style>
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: var(--font-sans); }
  #root { height: 100vh; }

  /* Hide internal sidebars of page components — shell provides its own */
  .shell-active .dash-sidebar { display: none !important; }
  .shell-active .dash-frame,
  .shell-active .cargas-frame { grid-template-columns: 1fr !important; height: 100% !important; width: 100% !important; }

  .shell {
    display: grid;
    grid-template-columns: 240px 1fr;
    height: 100vh;
    overflow: hidden;
    background: var(--color-bg-soft);
  }

  .shell-page { overflow: auto; background: var(--color-bg-soft); }

  /* Login takes full viewport, no shell */
  .login-fullscreen { height: 100vh; width: 100vw; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="has-sidebar">
<a class="hub-back on-light" href="index.html" title="Voltar ao hub de demonstração">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  <span class="label-default">Hub da demo</span>
  <span class="label-hover">Voltar</span>
</a>
<div id="root"></div>

<script type="text/babel" src="admin-login.jsx?v=3"></script>
<script type="text/babel" src="admin-dashboard.jsx?v=3"></script>
<script type="text/babel" src="admin-cargas.jsx?v=3"></script>
<script type="text/babel" src="nps-screens.jsx?v=3"></script>
<script type="text/babel" src="admin-extra-pages.jsx?v=3"></script>

<script type="text/babel">

const { useState, useEffect } = React;

const NAV_GROUPS = [
{ label: "Operação", items: [
  { id: "dashboard", label: "Dashboard", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9" /><rect x="14" y="3" width="7" height="5" /><rect x="14" y="12" width="7" height="9" /><rect x="3" y="16" width="7" height="5" /></svg> },
  { id: "cargas", label: "Cargas e entregas", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 3h15v13H1z" /><path d="M16 8h4l3 3v5h-7V8z" /><circle cx="5.5" cy="18.5" r="2.5" /><circle cx="18.5" cy="18.5" r="2.5" /></svg>, count: 128 },
  { id: "mapa", label: "Mapa ao vivo", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C7.6 2 4 5.6 4 10c0 6 8 12 8 12s8-6 8-12c0-4.4-3.6-8-8-8z" /><circle cx="12" cy="10" r="3" /></svg> },
  { id: "motoristas", label: "Motoristas", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /></svg> },
  { id: "montadores", label: "Montadores", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" /></svg>, count: 4 }]
},
{ label: "Insights", items: [
  { id: "nps", label: "NPS", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg> },
  { id: "relatorios", label: "Relatórios", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" /></svg> }]
}];


function Stub({ title }) {
  return (
    <div style={{ padding: 80, textAlign: "center", color: "var(--color-text-secondary)" }}>
      <div style={{ fontSize: 60, opacity: 0.2, marginBottom: 16 }}>✦</div>
      <h2 style={{ fontSize: 24, margin: 0, color: "var(--color-text-primary)" }}>{title}</h2>
      <p style={{ marginTop: 8 }}>Em breve nesta versão do protótipo.</p>
    </div>);

}

function ShellSidebar({ page, onNav, onLogout }) {
  return (
    <aside className="dash-sidebar" style={{ display: "flex" }}>
      <div className="brand">
        <img src="assets/logo-white.png" alt="Divan Móveis" style={{ height: 30, width: "auto", display: "block" }} />
      </div>
      {NAV_GROUPS.map((g) =>
      <React.Fragment key={g.label}>
          <div className="sec-label">{g.label}</div>
          {g.items.map((it) =>
        <div key={it.id} className={`dash-nav ${page === it.id ? "active" : ""}`} onClick={() => onNav(it.id)}>
              {it.icon}{it.label}
              {it.count && <span className="badge-count">{it.count}</span>}
            </div>
        )}
        </React.Fragment>
      )}
      <div className="dash-user" onClick={onLogout} style={{ cursor: "pointer" }}>
        <div className="avatar">DC</div>
        <div><div className="name">Daniel C.</div><div className="role">Sair →</div></div>
      </div>
    </aside>);

}

function App() {
  const [logged, setLogged] = useState(() => localStorage.getItem("divan.logged") === "1");
  const [page, setPage] = useState(() => localStorage.getItem("divan.page") || "dashboard");

  useEffect(() => {localStorage.setItem("divan.page", page);}, [page]);
  useEffect(() => {localStorage.setItem("divan.logged", logged ? "1" : "0");}, [logged]);

  if (!logged) {
    return (
      <div className="login-fullscreen" onClick={(e) => {
        // any click on the login form's submit button logs in
        if (e.target.tagName === "BUTTON" || e.target.closest("button")) setLogged(true);
      }}>
        <AdminLogin />
      </div>);

  }

  let PageEl;
  if (page === "dashboard") PageEl = <AdminDashboard />;else
  if (page === "cargas") PageEl = <AdminCargas />;else
  if (page === "nps") PageEl = <AdminNPS />;else
  if (page === "mapa") PageEl = <AdminMapa />;else
  if (page === "motoristas") PageEl = <AdminMotoristas />;else
  if (page === "montadores") PageEl = <AdminMontadores />;else
  if (page === "relatorios") PageEl = <AdminRelatorios />;else
  PageEl = <Stub title={NAV_GROUPS.flatMap((g) => g.items).find((i) => i.id === page)?.label || page} />;

  return (
    <div className="shell">
      <ShellSidebar page={page} onNav={setPage} onLogout={() => setLogged(false)} />
      <div className="shell-page shell-active">
        {PageEl}
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
