<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Divan · App do Montador</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="design-system.css" />
<link rel="stylesheet" href="extras-motorista.css?v=3" />
<link rel="stylesheet" href="extras-montador.css?v=4" />
<link rel="stylesheet" href="hub-button.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100vh; font-family: var(--font-sans); background: #0f1115; color: #fff; overflow: hidden; }
  #root { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; box-sizing: border-box; }
  .mob-stage { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .stage-label { color: rgba(255,255,255,0.45); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; }
  .stage-label strong { color: #FFC940; }
  .phone-wrap { position: relative; }
  .phone-wrap .mont-footer { display: none; }

  .bottom-nav {
    position: absolute;
    left: 12px; right: 12px; bottom: 18px;
    height: 64px;
    background: rgba(20,20,20,0.94);
    backdrop-filter: blur(20px);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 8px;
    z-index: 50;
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
  }
  .bottom-nav .tab {
    flex: 1; height: 48px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    border-radius: 14px;
    transition: color 0.15s, background 0.15s;
    position: relative;
  }
  .bottom-nav .tab.active { color: #FFC940; background: rgba(247,168,0,0.16); }
  .bottom-nav .tab .badge-dot {
    position: absolute; top: 4px; right: 28%;
    width: 8px; height: 8px; border-radius: 50%;
    background: #F7A800; border: 2px solid rgba(20,20,20,0.94);
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<a class="hub-back" href="index.html" title="Voltar ao hub de demonstração">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  <span class="label-default">Hub da demo</span>
  <span class="label-hover">Voltar</span>
</a>
<div id="root"></div>
<script type="text/babel" src="montador-screens.jsx?v=3"></script>
<script type="text/babel">
const { useState } = React;

function MontPerfil() {
  return (
    <div className="phone-frame">
      <div className="phone-screen" style={{ background: "linear-gradient(180deg, #1a1a1a 0%, #2a200e 100%)", color: "#fff", padding: "60px 24px 100px", overflow: "auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
          <div style={{ width: 64, height: 64, borderRadius: "50%", background: "linear-gradient(135deg,#F7A800,#FFC940)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, fontWeight: 800, color: "#1a1a1a" }}>BG</div>
          <div>
            <div style={{ fontSize: 18, fontWeight: 700 }}>Bruno Garcia</div>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.6)" }}>Montador parceiro · MEI</div>
          </div>
        </div>

        <div style={{ background: "linear-gradient(135deg, rgba(247,168,0,0.18), rgba(255,201,64,0.05))", border: "1px solid rgba(247,168,0,0.25)", borderRadius: 14, padding: 16, marginBottom: 16 }}>
          <div style={{ fontSize: 11, color: "#FFC940", textTransform: "uppercase", letterSpacing: ".08em", fontWeight: 700, marginBottom: 10 }}>Repasse do mês</div>
          <div style={{ fontSize: 28, fontWeight: 800, marginBottom: 4 }}>R$ 4.380</div>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)" }}>21 montagens · Fechamento em 5 dias</div>
        </div>

        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 14, padding: 16, marginBottom: 16 }}>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", textTransform: "uppercase", letterSpacing: ".08em", fontWeight: 700, marginBottom: 10 }}>Seu desempenho</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
            <div><div style={{ fontSize: 22, fontWeight: 800 }}>4.9</div><div style={{ fontSize: 11, color: "rgba(255,255,255,0.55)" }}>Avaliação</div></div>
            <div><div style={{ fontSize: 22, fontWeight: 800 }}>21</div><div style={{ fontSize: 11, color: "rgba(255,255,255,0.55)" }}>Este mês</div></div>
            <div><div style={{ fontSize: 22, fontWeight: 800 }}>1h12</div><div style={{ fontSize: 11, color: "rgba(255,255,255,0.55)" }}>Tempo médio</div></div>
          </div>
        </div>

        {[
          ["Histórico e recibos", "Últimas 21 montagens"],
          ["Dados bancários", "Banco Inter · Pix"],
          ["Documentos", "CNPJ MEI, ferramentas"],
          ["Suporte", "Falar com a operação"],
        ].map(([t, s]) => (
          <div key={t} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 4px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 600 }}>{t}</div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginTop: 2 }}>{s}</div>
            </div>
            <span style={{ color: "rgba(255,255,255,0.4)" }}>→</span>
          </div>
        ))}
        <button style={{ marginTop: 24, width: "100%", background: "transparent", border: "1px solid rgba(255,255,255,0.15)", color: "rgba(255,255,255,0.8)", padding: 14, borderRadius: 12, fontFamily: "inherit", fontSize: 14, fontWeight: 600 }}>Sair</button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState(() => localStorage.getItem("divan.mont.tab") || "home");
  React.useEffect(() => { localStorage.setItem("divan.mont.tab", tab); }, [tab]);

  let Page;
  if (tab === "ativa") Page = MontadorAtiva;
  else if (tab === "perfil") Page = MontPerfil;
  else if (tab === "confirmacao") Page = MontadorConfirmacao;
  else Page = MontadorHome;

  return (
    <div className="mob-stage">
      <div className="stage-label">App do <strong>Montador</strong> · Divan</div>
      <div className="phone-wrap">
        <Page />
        {tab !== "confirmacao" && <nav className="bottom-nav">
          <div className={`tab ${tab === "home" ? "active" : ""}`} onClick={() => setTab("home")}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            Agenda
          </div>
          <div className={`tab ${tab === "ativa" ? "active" : ""}`} onClick={() => setTab("ativa")}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            Montagem
            <span className="badge-dot"></span>
          </div>
          <div className={`tab ${tab === "perfil" ? "active" : ""}`} onClick={() => setTab("perfil")}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 22a8 8 0 0 1 16 0"/></svg>
            Perfil
          </div>
        </nav>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
