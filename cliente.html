<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Divan · Avaliação do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css?v=10" />
<link rel="stylesheet" href="design-system.css?v=10" />
<link rel="stylesheet" href="extras-admin.css?v=10" />
<link rel="stylesheet" href="extras-motorista.css?v=10" />
<link rel="stylesheet" href="extras-nps.css?v=11" />
<link rel="stylesheet" href="extras-cliente-desktop.css?v=1" />
<link rel="stylesheet" href="hub-button.css?v=4" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<a class="hub-back on-light" href="index.html" title="Voltar ao hub de demonstração">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  <span class="label-default">Hub da demo</span>
  <span class="label-hover">Voltar</span>
</a>
<div id="root"></div>
<script type="text/babel" src="nps-screens.jsx?v=11"></script>
<script type="text/babel">
const { useState } = React;

const VIEWS = {
  tracking: {
    label: "🚚 Acompanhamento",
    h:      "Acompanhamento durante a entrega",
    sub:    "Link recebido por WhatsApp · acompanhamento em tempo real",
  },
  nps: {
    label: "⭐ Avaliação NPS",
    h:      "Avaliação após a montagem",
    sub:    "Formulário enviado por WhatsApp depois que tudo termina",
  },
  obrigado: {
    label: "💛 Obrigado",
    h:      "Confirmação carinhosa após o feedback",
    sub:    "Mostra o resumo, agradece e oferece um cupom de fidelidade",
  },
};

function ClienteShowcase() {
  const [view, setView] = useState("tracking");
  const [device, setDevice] = useState("online"); // "online" (desktop) | "app" (mobile)
  const meta = VIEWS[view];

  let Comp;
  if (device === "online") {
    if (view === "tracking") Comp = <ClienteTrackingDesktop />;
    if (view === "nps")      Comp = <ClienteNPSFormDesktop onSubmit={() => setView("obrigado")} />;
    if (view === "obrigado") Comp = <ClienteObrigadoDesktop />;
  } else {
    if (view === "tracking") Comp = <ClienteTracking />;
    if (view === "nps")      Comp = <ClienteNPSForm onSubmit={() => setView("obrigado")} />;
    if (view === "obrigado") Comp = <ClienteObrigado />;
  }

  return (
    <div className={`cli-showcase ${device === "online" ? "online-mode" : ""}`}>
      <div className="cli-toggle-bar">
        <div className="cli-toggle-meta">
          <div className="cli-toggle-tag">Jornada do Cliente</div>
          <div className="cli-toggle-h">{meta.h}</div>
          <div className="cli-toggle-sub">{meta.sub}</div>
        </div>
        <div className="cli-toggles">
          <div className="cli-toggle">
            {Object.entries(VIEWS).map(([id, v]) => (
              <button
                key={id}
                className={view === id ? `on ${id}` : ""}
                onClick={() => setView(id)}
              >
                {v.label}
              </button>
            ))}
          </div>
          <div className="cli-device-toggle">
            <button
              className={device === "online" ? "on" : ""}
              onClick={() => setDevice("online")}
              title="Versão online (desktop)"
            >
              🖥️ Online
            </button>
            <button
              className={device === "app" ? "on" : ""}
              onClick={() => setDevice("app")}
              title="App mobile (link WhatsApp no celular)"
            >
              📱 App mobile
            </button>
          </div>
        </div>
      </div>

      <div className={`cli-stage ${device === "online" ? "online" : "mobile"}`}>
        {Comp}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ClienteShowcase />);
</script>
</body>
</html>
