<body>
<a class="hub-back on-light" href="index.html" title="Voltar ao hub de demonstração">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  <span class="label-default">Hub da demo</span>
  <span class="label-hover">Voltar</span>
</a>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="nps-screens.jsx?v=3"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="cliente-tracking"
        title="Cliente — Acompanhamento ao vivo"
        subtitle="Tela aberta pelo cliente via link WhatsApp · timeline de status, mapa do motorista, dados do pedido e contato de suporte"
      >
        <DCArtboard id="track-live" label="Acompanhamento · 390 × 844" width={390} height={844}>
          <ClienteTracking />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="cliente-nps"
        title="Cliente — Avaliação após a montagem"
        subtitle="Formulário enviado por WhatsApp · estrelas separadas para motorista e montador + NPS 0–10 + comentário"
      >
        <DCArtboard id="nps-form" label="Avaliação NPS · 390 × 844" width={390} height={844}>
          <ClienteNPSForm />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
