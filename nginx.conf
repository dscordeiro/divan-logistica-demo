server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Charset UTF-8 pra acentos
  charset utf-8;
  charset_types text/html text/css text/javascript application/javascript application/json image/svg+xml;

  # Compressão (Babel + JSX são pesados, gzip ajuda muito)
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml;

  # Headers de segurança básicos
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Cache agressivo pra assets versionados
  location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|otf|eot|mp4|webm|mp3)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
  }

  # Cache curto pra CSS/JS/JSX (durante a demo a gente pode trocar coisas)
  location ~* \.(css|js|jsx)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
  }

  # HTML sem cache (sempre puxa a versão nova)
  location ~* \.html$ {
    expires 0;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Rota raiz → index.html (hub)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Bloqueia acesso a arquivos sensíveis (caso entrem por acidente)
  location ~ /\.(git|env|DS_Store) {
    deny all;
    return 404;
  }
}
